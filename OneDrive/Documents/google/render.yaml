services:
  - type: web
    name: healthgap-ai-erraticboy
    env: node
    plan: free
    rootDir: "OneDrive/Documents/google"
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
