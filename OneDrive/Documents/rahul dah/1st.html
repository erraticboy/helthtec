<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
    }
    header {
      padding: 20px;
      background: rgba(0,0,0,0.5);
      color: #fff;
    }
    h1 {
      font-size: 3em;
      margin: 0;
    }
    video {
      width: 300px;       /* narrow width for vertical look */
      height: 500px;      /* taller height for portrait */
      margin: 30px auto;
      display: block;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
    }
    .gallery img {
      width: 250px;
      height: auto;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    .quote {
      font-size: 1.5em;
      margin: 40px;
      font-style: italic;
      color: #222;
    }
    footer {
      margin: 30px;
      font-size: 1.2em;
      color: #444;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎉 Happy Birthday In Advance, Dah! 🎉</h1>
  </header>

  <!-- Vertical Birthday Video -->
  <video controls autoplay>
    <source src="WhatsApp Video 2026-03-08 at 21.52.42.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Photo Gallery -->
  <div class="gallery">
    <img src="image.png" alt="Memory 1">
    <img src="image copy.png" alt="Memory 2">
    <img src="image copy 2.png" alt="Memory 3">
    <!-- Add more photos -->
  </div>

  <!-- Emotional Quote -->
  <div class="quote">
    "No matter how old we grow, you’ll always be my hero. <br> I’m proud to call you my brother, and I wish you all the joy in the world today.”"
  </div>

  <footer>
    lv u dah! ❤️<br>by Ashu💫
  </footer>
</body>
</html>
